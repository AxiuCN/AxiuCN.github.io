<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>阿修Axiu · Axiu Network</title>

  <!-- 字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Remix Icon -->
  <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
    rel="stylesheet"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>

  <!-- ===================== -->
  <!-- 背景层 -->
  <!-- ===================== -->

  <div class="background-glow"></div>
  <div class="background-grid"></div>

  <!-- ===================== -->
  <!-- Header -->
  <!-- ===================== -->

  <header class="header">

    <!-- 左侧 -->
    <div class="header-left">

      <div class="logo-group">

        <div class="logo-avatar">
          <img src="./images/avatar.png" alt="阿修Axiu">
        </div>

        <div class="logo-text">
          <h1>阿修Axiu</h1>
          <span>Axiu Network</span>
        </div>

      </div>

    </div>

    <!-- 中间 -->
    <div class="header-center">

      <div class="welcome-text" id="welcomeText">
        晚上好，欢迎来到 阿修Axiu · Axiu Network
      </div>

    </div>

    <!-- 右侧 -->
    <div class="header-right">

      <!-- 状态 -->
      <div class="status-box">

        <span class="status-dot"></span>

        <span class="status-text">
          Services Online
        </span>

      </div>

      <!-- 时间 -->
      <div class="time-box">

        <div class="time-date" id="dateText">
          2026/05/25
        </div>

        <div class="time-clock" id="clockText">
          22:14:36
        </div>

      </div>

      <!-- 导航 -->
      <nav class="nav-links">

        <a
          href="https://github.com/AxiuCN"
          target="_blank"
          class="nav-btn"
        >
          <i class="ri-github-fill"></i>
          <span>GitHub</span>
        </a>

        <a
          href="https://space.bilibili.com/3546581022280527"
          target="_blank"
          class="nav-btn"
        >
          <i class="ri-bilibili-fill"></i>
          <span>Bilibili</span>
        </a>

        <a
          href="/docs"
          class="nav-btn"
        >
          <i class="ri-book-open-line"></i>
          <span>Docs</span>
        </a>

      </nav>

    </div>

  </header>

  <!-- ===================== -->
  <!-- Hero -->
  <!-- ===================== -->

  <main class="hero">

    <div class="hero-content">

      <div class="hero-text">

        <div class="hero-tag">
          AXIU NETWORK
        </div>

        <h2>
          个人网络服务<br>
          与社区空间
        </h2>

        <p>
          Minecraft · TRSS-Yunzai · MCSManager · Docs · Community
        </p>

        <div class="hero-buttons">

          <a href="/status" class="hero-btn primary-btn">
            查看状态
          </a>

          <a href="/docs" class="hero-btn secondary-btn">
            文档中心
          </a>

        </div>

      </div>

      <div class="hero-image">

        <img src="./images/hutao-banner.png" alt="Hu Tao">

      </div>

    </div>

  </main>

  <!-- ===================== -->
  <!-- JS -->
  <!-- ===================== -->

  <script>

    // =====================
    // 时间
    // =====================

    function updateClock() {

      const now = new Date();

      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");

      const hours = String(now.getHours()).padStart(2, "0");
      const minutes = String(now.getMinutes()).padStart(2, "0");
      const seconds = String(now.getSeconds()).padStart(2, "0");

      document.getElementById("dateText").textContent =
        `${year}/${month}/${day}`;

      document.getElementById("clockText").textContent =
        `${hours}:${minutes}:${seconds}`;

    }

    setInterval(updateClock, 1000);
    updateClock();

    // =====================
    // 欢迎语
    // =====================

    function updateWelcome() {

      const hour = new Date().getHours();

      let greeting = "晚上好";

      if (hour >= 5 && hour < 12) {
        greeting = "早上好";
      }
      else if (hour >= 12 && hour < 18) {
        greeting = "下午好";
      }
      else if (hour >= 18 && hour < 23) {
        greeting = "晚上好";
      }
      else {
        greeting = "夜深了";
      }

      document.getElementById("welcomeText").textContent =
        `${greeting}，欢迎来到 阿修Axiu · Axiu Network`;

    }

    updateWelcome();

  </script>

</body>
</html>
